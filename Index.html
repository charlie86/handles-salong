<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HS - Handles Salong</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Georgia', serif; overflow-x: hidden; }
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; border-bottom: 1px solid #2a2a2a; position: fixed; width: 100%; top: 0; background: rgba(10,10,10,0.95); z-index: 100; }
        nav h1 { color: #ffffff; font-size: 24px; letter-spacing: 4px; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav ul li a { color: #aaaaaa; text-decoration: none; letter-spacing: 2px; font-size: 13px; transition: color 0.3s; }
        nav ul li a:hover { color: #4a9e6b; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-bottom: 1px solid #2a2a2a; position: relative; z-index: 1; }
        .hero h2 { font-size: 60px; letter-spacing: 8px; margin-bottom: 20px; }
        .hero p { color: #4a9e6b; letter-spacing: 4px; font-size: 14px; margin-bottom: 40px; }
        .btn { padding: 15px 40px; border: 1px solid #4a9e6b; color: #4a9e6b; text-decoration: none; letter-spacing: 3px; font-size: 12px; transition: all 0.3s; }
        .btn:hover { background-color: #4a9e6b; color: #0a0a0a; }
        section { padding: 80px 50px; border-bottom: 1px solid #2a2a2a; position: relative; z-index: 1; }
        section h3 { font-size: 28px; letter-spacing: 6px; text-align: center; margin-bottom: 60px; color: #ffffff; }
        .fade-in { opacity: 0; transform: translateY(40px); transition: opacity 0.8s ease, transform 0.8s ease; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
        .barbers { display: flex; justify-content: center; gap: 60px; flex-wrap: wrap; }
        .barber { width: 300px; }
        .barber h4 { font-size: 20px; letter-spacing: 4px; color: #4a9e6b; margin-bottom: 30px; text-align: center; }
        .service-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #1a1a1a; font-size: 14px; letter-spacing: 2px; color: #cccccc; }
        .reviews { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .review-card { background: #ffffff; color: #0a0a0a; padding: 30px; width: 280px; border-radius: 4px; transition: transform 0.3s; }
        .review-card:hover { transform: translateY(-8px); }
        .stars { color: #4a9e6b; font-size: 20px; margin-bottom: 15px; }
        .review-card p { font-size: 14px; line-height: 1.7; margin-bottom: 15px; color: #333333; }
        .review-card span { font-size: 12px; letter-spacing: 2px; color: #666666; }
        .contact-grid { display: flex; justify-content: center; gap: 80px; flex-wrap: wrap; text-align: center; }
        .contact-item h4 { color: #4a9e6b; letter-spacing: 3px; font-size: 13px; margin-bottom: 15px; }
        .contact-item p { color: #aaaaaa; font-size: 14px; line-height: 1.8; letter-spacing: 1px; }
        footer { text-align: center; padding: 30px; color: #444444; font-size: 12px; letter-spacing: 2px; position: relative; z-index: 1; }
    </style>
</head>
